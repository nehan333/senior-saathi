<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeniorSaathi</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>SeniorSaathi</h1>
        <p>Your Digital Companion for Daily Life</p>
    </header>

    <section class="controls">

        <button onclick="document.getElementById('fileInput').click()">
	📄 Upload Document
	</button>
            
        

        <button onclick="getSchemes()">
            🏛 Government Schemes
        </button>

        <button onclick="translateText()">
            🌍 Translate
        </button>

        <button onclick="speakOutput()">
            🔊 Read Aloud
        </button>

    </section>

    <section class="language">

        <label>Language:</label>

        <select id="language">
            <option value="en">English</option>
            <option value="te">Telugu</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
        </select>

    </section>

    <section class="output-card">

        <h2>Output</h2>

        <div id="output">
            Welcome to SeniorSaathi
        </div>

    </section>

</div>


<section class="emergency-card">

    <h2>🚨 Emergency Contacts</h2>

    <input
        type="text"
        id="contactName"
        placeholder="Enter Contact Name">

    <input
        type="text"
        id="contactPhone"
        placeholder="Enter Phone Number">

    <button onclick="addContact()">
        ➕ Add Contact
    </button>

    <button onclick="viewContacts()">
        📞 View Contacts
    </button>

    <button onclick="sendEmergency()">
        🚨 SOS Alert
    </button>

</section>

<input
    type="file"
    id="fileInput"
    accept="image/*"
    style="display:none">

<script src="/frontend/script.js"></script>
</body>
</html>
